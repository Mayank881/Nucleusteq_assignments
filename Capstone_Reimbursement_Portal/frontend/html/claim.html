<!DOCTYPE html>
<html>

<head>
    <title>Submit Claim</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <h2>Submit Claim</h2>

    <div class="form-container">

        <form id="claimForm">

            <div class="form-group">
                <label>Amount</label>
                <input type="number" id="amount">
            </div>

            <div class="form-group">
                <label>Date</label>
                <input type="date" id="date">
            </div>

            <div class="form-group">
                <label>Description</label>
                <input type="text" id="description">
            </div>

            <button type="submit">Submit Claim</button>

        </form>

    </div>

    <p id="message"></p>
       
    <!-- View Claims Button -->
    <button onclick="loadClaims()">View Claims</button>
    
    <!--claim table -->
    <table border="1" id="claimTable" style="display:none;">
        <thead>
            <tr>
                <th>ID</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Description</th>
            </tr>
        </thead>
        <tbody id="claimBody"></tbody>
    </table>
    <script src="js/api.js"></script>
    <script src="js/claim.js"></script>
</body>

</html>
