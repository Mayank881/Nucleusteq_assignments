<!DOCTYPE html>
<html>

<head>

</head>

<body>

    <nav id="navbar"></nav>

    <!-- Load Claims -->
    <button onclick="loadClaims()">Load Claims</button>

    <!-- Claims Table -->
    <table border="1" id="claimTable" style="margin-top: 10px; display: none;">

                <th>Amount</th>
                <th>Description</th>
                <th>Date</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody id="claimBody"></tbody>
    </table>

    <p id="message"></p>

    <script src="../js/api.js"></script>
    <script src="../js/reviewer.js"></script>
   <script>
    window.onload = loadNavbar;
</script>

</body>
