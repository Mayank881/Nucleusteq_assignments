<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>My Claims — Reimbursement Portal</title>
    <link rel="stylesheet" href="../css/style.css" />
</head>

<body class="page-employee">
    <div class="app-layout">

        <!-- NAVBAR -->
        <nav class="navbar">
            <div class="navbar-brand">
                <span>Reimbursement Portal</span>
            </div>

            <div class="navbar-right">

                <div class="user-pill">


                    <div class="avatar" id="avatar"></div>

                    <div class="user-info">
                        <span class="user-name" id="nav-name">user</span>
                        <span class="user-role" id="nav-role">Employee</span>
                    </div>

                </div>

                <button class="btn btn-ghost btn-sm" onclick="Auth.logout()">Logout</button>

            </div>
        </nav>

        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-label">Menu</div>

                <a class="sidebar-item active" onclick="showTab('claims')" href="#">
                    <span class="si-icon">📋</span> My Claims
                </a>

                <a class="sidebar-item" onclick="showTab('submit')" href="#">
                    <span class="si-icon">✚</span> Submit New
                </a>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main">

            <!-- CLAIMS TAB -->
            <div id="tab-claims">

                <div class="page-header">
                    <div class="page-title">My Claims</div>
                    <div class="page-sub">Track all your submitted claims</div>
                </div>

                <!-- Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">Total</div>
                        <div class="stat-value" id="stat-total">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Approved</div>
                        <div class="stat-value success" id="stat-approved">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Pending</div>
                        <div class="stat-value warn" id="stat-pending">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Rejected</div>
                        <div class="stat-value danger" id="stat-rejected">0</div>
                    </div>
                </div>

                <!-- Claims List -->
                <div class="card">
                    <div class="card-header">
                        <span class="card-title">All Claims</span>

                        <div class="pagination">
                            <button class="btn btn-ghost btn-sm" onclick="changePage(-1)">Prev</button>
                            <span id="page-info">Page 1</span>
                            <button class="btn btn-ghost btn-sm" onclick="changePage(1)">Next</button>
                        </div>
                    </div>

                    <div id="claims-list">
                        <div class="empty-state">
                            <p>Loading...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SUBMIT TAB -->
            <div id="tab-submit" style="display:none;">

                <div class="page-header">
                    <div class="page-title">Submit Claim</div>
                </div>

                <div class="card" style="max-width:500px;">
                    <input type="number" id="amount" placeholder="Amount" />
                    <input type="date" id="date" />
                    <input type="text" id="description" placeholder="Description" />

                    <button class="btn btn-primary" onclick="submitClaim()">Submit</button>
                </div>
            </div>

        </main>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/employee.js"></script>

</body>

</html>
